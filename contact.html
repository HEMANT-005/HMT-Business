<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HMT Business Consulting HTML Template</title>
    <link rel="shortcut icon" href="images/fav-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/queary.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/aos.css">
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .subs::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .contact {
            font-size: clamp(60px, 10vw, 145px);
            position: absolute;
            font-weight: 900;
            letter-spacing: 0;
            top: 0;
            transform: translate(-50%, -50%);
            left: 50%;
            z-index: -1;
            min-width: max-content;
            color: transparent;
            -webkit-text-stroke-width: 1px;
            -webkit-text-stroke-color: rgba(0, 0, 0, 0.288);
            line-height: 1;
            height: auto;
        }

        .contact::after {
            position: absolute;
            content: "";
            left: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg,
                    rgb(255, 255, 255) 0%,
                    rgba(255, 255, 255, 0.6082808123) 50%,
                    rgba(255, 255, 255, 0) 100%);
        }

        .contact-section {
            padding: 200px 0px 30px 0px;
            position: relative;
        }

        .contact-card {
            background: #1f2a30;
            color: #fff;
            padding: 40px;
            border-radius: 15px;
            height: 100%;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .contact-img {
            border-radius: 15px;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .form-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .btn-dark-custom {
            background: #1f2a30;
            color: #fff;
            padding: 10px 25px;
            border-radius: 10px;
        }

        .btn-dark-custom:hover {
            background: #000;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar bg-white fixed-top navbar-expand-lg">
            <div class="container">
                <a href="index.html" class="w-25">
                    <img src="images/HMT_Business_Solution.png" alt="HMT-LOGO" class="HMT-LOGO" />
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                            Offcanvas
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body d-flex align-items-center">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3 align-items-center">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="index.html">Back to Home</a>
                            </li>
                        </ul>
                        <a class="nav-link active py-2 px-3 me-2 rounded-2" style="background-color: #6f717321"
                            aria-current="page" href="#">
                            <i class="bi bi-search"></i>
                        </a>
                        <button class="btn-1 liquid">
                            <a href="contact.html" class="text-decoration-none text-black">
                                <span>Get Quote</span>
                            </a>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="contact-section">

            <div class="container">
                <div class="col-12" data-aos="fade-up">
                    <div class="d-flex justify-content-center">
                        <div class="position-relative">
                            <span class="contact center d-lg-flex">
                                <span data-aos="fade-left" data-aos-delay="100">C</span>
                                <span data-aos="fade-left" data-aos-delay="200">o</span>
                                <span data-aos="fade-left" data-aos-delay="300">n</span>
                                <span data-aos="fade-left" data-aos-delay="400">t</span>
                                <span data-aos="fade-left" data-aos-delay="500">a</span>
                                <span data-aos="fade-left" data-aos-delay="600">c</span>
                                <span data-aos="fade-left" data-aos-delay="700">t</span>
                            </span>
                            <h2 class="fs-1">Contact</h2>
                        </div>
                    </div>
                </div>
                <div class="pt-5">
                    <div class="row g-4 align-items-center py-5 overflow-hidden">

                        <div class="col-lg-4" data-aos="fade-right">
                            <div class="contact-card">

                                <div class="mb-4" data-aos="fade-up">
                                    <div class="icon-box">
                                        <i class="bi bi-telephone-fill"></i>
                                    </div>
                                    <small>Call Us 24/7</small>
                                    <h5>(+256) 2145.2156</h5>
                                </div>

                                <div class="mb-4" data-aos="fade-up">
                                    <div class="icon-box">
                                        <i class="bi bi-envelope-fill"></i>
                                    </div>
                                    <small>Work with us</small>
                                    <h5>info@Invena.com</h5>
                                </div>

                                <div data-aos="fade-up">
                                    <div class="icon-box">

                                        <i class="bi bi-geo-alt-fill"></i>
                                    </div> <small>Our Location</small>
                                    <h5>125 Town, United State</h5>
                                </div>

                            </div>
                        </div>
                        <div class="col-lg-4 " data-aos="fade-up">
                            <img src="images/contact.webp" class="contact-img">
                        </div>
                        <div class="col-lg-4" data-aos="fade-left">
                            <div class="form-card" data-aos="fade-up">
                                <h4 class="mb-4">Get In Touch</h4>

                                <form>
                                    <div class="mb-3" data-aos="fade-up">
                                        <input type="text" class="form-control" placeholder="Your Name">
                                    </div>

                                    <div class="mb-3" data-aos="fade-up">
                                        <input type="email" class="form-control" placeholder="Johndoe@gmail.com">
                                    </div>

                                    <div class="mb-3" data-aos="fade-up">
                                        <textarea class="form-control" rows="4" placeholder="Message"></textarea>
                                    </div>

                                    <div class="form-check mb-3" data-aos="fade-up">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">
                                            I agree to the Terms & Conditions
                                        </label>
                                    </div>

                                    <button class="btn btn-dark-custom" data-aos="fade-up">Get In Touch</button>
                                </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container py-3">

                <div class="col-12 mb-4" data-aos="fade-up">
                    <div class="ratio ratio-16x9 rounded-4 overflow-hidden shadow">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d29208.07522277672!2d90.423296!3d23.7826795!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sbd!4v1738651440174!5m2!1sen!2sbd"
                            style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
                <div class="col-12 d-lg-block d-none">
                    <div class="text-center">
                        <h2>Our Trusted Clients</h2>
                    </div>
                    <div class="list">
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="100">
                            <img src="images/1.webp" alt="" class="img-fluid">
                        </div>
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="200">
                            <img src="images/2.webp" alt="" class="img-fluid">
                        </div>
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="300">
                            <img src="images/3.webp" alt="" class="img-fluid">
                        </div>
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="400">
                            <img src="images/4.webp" alt="" class="img-fluid">
                        </div>
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="500">
                            <img src="images/5.webp" alt="" class="img-fluid">
                        </div>
                        <div class="item aos-init aos-animate" data-aos="zoom-in-up" data-aos-delay="600">
                            <img src="images/6.webp" alt="" class="img-fluid">
                        </div>
                    </div>
                </div>
            </div>

        </section>
        <section class="py-3">
            <div class="container">

                <div class="row align-items-center g-4 overflow-hidden">

                    <div class="col-lg-6" data-aos="fade-up-right">
                        <p class="text-muted mb-2">Subscribe Newsletter</p>
                        <h1 class="fw-bold display-4">
                            Stay Updated with <br> the Latest News!
                        </h1>
                    </div>

                    <div class="col-lg-6" data-aos="fade-up-left">
                        <div class="bg-dark p-2 rounded-4 d-flex align-items-center justify-content-between">

                            <input type="email" class="form-control subs border-0 bg-transparent text-white px-3"
                                placeholder="Enter Email Address">

                            <button class="btn btn-light rounded-3 px-4 py-2 ms-2 fs-5 text-nowrap">
                                Subscribe Now
                            </button>

                        </div>
                    </div>

                </div>

            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="py-4 text-center">
            <p class="text-white fs-6">Invena - Copyright 2026. All rights reserved.</p>
        </div>
    </footer>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="js/custom.js"></script>>
</body>

</html>
